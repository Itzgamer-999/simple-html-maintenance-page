<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GlassFlix — Movies & TV</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="preconnect" href="https://image.tmdb.org" crossorigin>
  <link rel="preconnect" href="https://api.themoviedb.org" crossorigin>
  <link rel="stylesheet" href="styles/theme.css" />
  <link rel="stylesheet" href="styles/glass.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/animations.css" />
</head>
<body>
  <header class="site-header"></header>

  <main class="container" style="padding: 1rem 0 2rem;">
    <section class="section">
      <div id="site-status-pill"></div>
    </section>
    <section id="trending" class="section">
      <h2>🔥 Trending Today</h2>
      <div class="cards"></div>
    </section>
    <section id="nowplaying" class="section">
      <h2>🎬 Now Playing</h2>
      <div class="cards"></div>
    </section>
    <section id="ontheair" class="section">
      <h2>📺 Currently Airing</h2>
      <div class="cards"></div>
    </section>
    <section id="popular-movies" class="section">
      <h2>🍿 Popular Movies</h2>
      <div class="cards"></div>
    </section>
    <section id="popular-tv" class="section">
      <h2>📡 Popular TV</h2>
      <div class="cards"></div>
    </section>
    <section id="toprated-movies" class="section">
      <h2>🏆 Top Rated Movies</h2>
      <div class="cards"></div>
    </section>
    <section id="toprated-tv" class="section">
      <h2>🏆 Top Rated TV</h2>
      <div class="cards"></div>
    </section>
  </main>

  <footer class="container footer">
    <div class="footer-links">
      <span>© <span id="year"></span> GlassFlix</span>
      <a class="link-underline" href="my-list.html">My List</a>
      <a class="link-underline" href="search.html">Browse</a>
    </div>
  </footer>

  <script type="module" src="./scripts/app.js"></script>
  <script type="module" src="./scripts/home.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
