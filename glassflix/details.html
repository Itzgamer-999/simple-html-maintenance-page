<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Details — GlassFlix</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="preconnect" href="https://image.tmdb.org" crossorigin>
  <link rel="preconnect" href="https://api.themoviedb.org" crossorigin>
  <link rel="stylesheet" href="styles/theme.css" />
  <link rel="stylesheet" href="styles/glass.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/animations.css" />
</head>
<body>
  <header class="site-header"></header>

  <section id="hero" class="hero">
    <div class="hero-bg"></div>
    <div class="container hero-overlay">
      <div class="content-glass">
        <div style="display:flex; gap:1rem; align-items:center; justify-content:space-between; flex-wrap:wrap;">
          <div>
            <div class="tag">Rating: <span id="rating">–</span></div>
            <h1 class="title">Loading…</h1>
            <p class="subtitle"></p>
            <div id="meta" class="muted"></div>
          </div>
          <div class="header-actions">
            <a href="#watch" class="btn btn-primary">▶ Watch Now</a>
            <button id="save-btn" class="btn btn-secondary">+ My List</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <main class="container" style="padding: 1rem 0 2rem;">
    <div class="grid-two">
      <section id="watch" class="section">
        <h2>▶ Player</h2>
        <div id="watch-panel" class="filters" style="margin:.5rem 0 .8rem">
          <div class="pill">Auto</div>
          <select id="episode-select" class="pill" title="Episode selector (TV only)"></select>
          <button id="party-create" class="btn">Start Watch Party (beta)</button>
          <input id="party-id" class="pill" placeholder="Room ID" style="width:160px" />
          <button id="party-join" class="btn">Join</button>
        </div>
        <div id="player" class="player glass"></div>
        <div id="party-chat" class="content-glass" style="margin-top:.6rem; display:none">
          <div style="font-weight:700; margin-bottom:.4rem">Room Chat (beta)</div>
          <div id="chat-log" style="max-height:200px; overflow:auto; margin-bottom:.4rem"></div>
          <div class="filters"><input id="chat-name" class="pill" placeholder="Name"/><input id="chat-text" class="pill" placeholder="Message"/><button id="chat-send" class="btn">Send</button></div>
        </div>
      </section>
      <section class="section">
        <h2>Cast</h2>
        <div id="cast" class="filters"></div>
      </section>
    </div>

    <section id="recommend" class="section">
      <h2>Because you watched…</h2>
      <div class="cards"></div>
    </section>
  </main>

  <footer class="container footer">
    <div class="footer-links">
      <span>© <span id="year"></span> GlassFlix</span>
      <a class="link-underline" href="my-list.html">My List</a>
      <a class="link-underline" href="index.html">Home</a>
    </div>
  </footer>

  <script type="module" src="./scripts/app.js"></script>
  <script type="module" src="./scripts/details.js"></script>
  <script type="module" src="./scripts/party.js"></script>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
