<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Status — GlassFlix</title>
  <link rel="stylesheet" href="styles/theme.css" />
  <link rel="stylesheet" href="styles/glass.css" />
  <link rel="stylesheet" href="styles/layout.css" />
</head>
<body>
  <header class="site-header"></header>
  <main class="container" style="padding:1rem 0 2rem">
    <section class="section">
      <h2>📈 System Status</h2>
      <div id="status" class="grid-two">
        <div class="content-glass">
          <h3>APIs</h3>
          <div id="tmdb">TMDB: <span class="pill">checking…</span></div>
          <div id="vidsrc">VidSrc: <span class="pill">checking…</span></div>
          <div style="margin-top:.8rem">
            <div style="display:flex; gap:1rem; align-items:center;">
              <div>TMDB 24h</div>
              <div id="spark-tmdb"></div>
            </div>
            <div style="display:flex; gap:1rem; align-items:center; margin-top:.4rem;">
              <div>VidSrc 24h</div>
              <div id="spark-vidsrc"></div>
            </div>
          </div>
        </div>
        <div class="content-glass">
          <h3>Incidents</h3>
          <div id="incidents">Loading…</div>
        </div>
      </div>
    </section>
  </main>
  <script type="module" src="./scripts/app.js"></script>
  <script type="module" src="./scripts/status.js"></script>
</body>
</html>
